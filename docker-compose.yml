services:
  lb:
    image: nginx:1.30.0-alpine
    platform: linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api1:
        condition: service_started
      api2:
        condition: service_started

  api1:
    build: .
    platform: linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: 135M
    environment:
      - REFERENCES_BIN=/opt/references.bin
      - DATA_PATH=/data
      - LISTEN=/sockets/api1.sock
    volumes:
      - sockets:/sockets
      - data:/data:ro
    depends_on:
      data-loader:
        condition: service_completed_successfully

  api2:
    build: .
    platform: linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.425"
          memory: 135M
    environment:
      - REFERENCES_BIN=/opt/references.bin
      - DATA_PATH=/data
      - LISTEN=/sockets/api2.sock
    volumes:
      - sockets:/sockets
      - data:/data:ro
    depends_on:
      data-loader:
        condition: service_completed_successfully
      api1:
        condition: service_started

  data-loader:
    image: alpine:3.23
    platform: linux/amd64
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 48M
    volumes:
      - data:/data
    restart: "no"
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache curl
        curl -fsSL -o /data/mcc_risk.json https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/mcc_risk.json
        curl -fsSL -o /data/normalization.json https://raw.githubusercontent.com/zanfranceschi/rinha-de-backend-2026/main/resources/normalization.json

volumes:
  sockets:
  data:
